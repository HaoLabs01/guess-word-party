<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>猜词派对</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <div class="camera-backdrop" id="cameraBackdrop" aria-hidden="true">
        <video id="cameraPreview" autoplay muted playsinline></video>
      </div>

      <section class="setup-screen" id="setupScreen" aria-label="游戏准备">
        <div class="setup-header">
          <h1>猜词派对</h1>
          <p>选好词库和时间，再把手机交给猜词的人。</p>
        </div>

        <section class="setup-grid" aria-label="游戏设置">
          <section class="setup-card category-panel" id="categoryPanel" aria-label="选择词库">
            <div class="panel-heading">
              <span>词库</span>
              <strong>选择词库</strong>
            </div>
            <div class="category-grid" id="categoryGrid" role="listbox" aria-label="选择词库"></div>
          </section>

          <section class="setup-card duration-panel" id="durationPanel" aria-label="选择游戏时间">
            <div class="panel-heading">
              <span>时间</span>
              <strong>本局时长</strong>
            </div>
            <div class="duration-buttons" id="durationButtons">
              <button class="time-button" type="button" data-duration="60">60s</button>
              <button class="time-button selected" type="button" data-duration="180">180s</button>
              <button class="time-button" type="button" data-duration="300">300s</button>
            </div>
          </section>

          <section class="setup-card recording-panel" id="recordingPanel" aria-label="是否录制">
            <div class="panel-heading">
              <span>权限</span>
              <strong>动作与录制</strong>
            </div>
            <div class="motion-control-row">
              <div class="record-copy">
                <small id="motionStatus">未开启</small>
                <small>开始前完成动作授权</small>
              </div>
              <button class="motion-button" id="motionButton" type="button">开启动作</button>
            </div>
            <div class="record-control-row">
              <div class="record-copy">
                <small id="recordStatus">OFF</small>
                <small>ON 后本局自动录制</small>
              </div>
              <button class="camera-button" id="cameraButton" type="button" role="switch" aria-checked="false" aria-label="录制视频">
                <span class="switch-label">OFF</span>
                <span class="switch-label">ON</span>
                <span class="switch-thumb"></span>
              </button>
            </div>
          </section>

          <section class="setup-card recordings-panel" id="recordingsPanel" aria-label="已录制的视频">
            <div class="recordings-title">
              <strong>已录制的视频</strong>
              <small id="recordingsStatus">读取中</small>
            </div>
            <div class="recordings-list" id="recordingsList"></div>
          </section>
        </section>

        <button class="primary setup-start" id="setupStartButton" type="button" aria-keyshortcuts="Space">开始游戏</button>
      </section>

      <section class="game-screen hidden" id="gameScreen" aria-label="游戏中">
        <section class="countdown-overlay hidden" id="countdownOverlay" aria-live="assertive">
          <span id="countdownNumber">3</span>
        </section>

        <section class="topbar">
          <button class="icon-button" id="resetButton" type="button" aria-label="停止本局">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div class="title-stack">
            <h1>猜词派对</h1>
            <span id="categoryName">成语</span>
          </div>
          <button class="icon-button group" id="wordsButton" type="button" aria-label="换一组词">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </section>

        <section class="hud" aria-label="本轮状态">
          <div class="score-panel score">
            <span>得分</span>
            <strong id="score">0</strong>
          </div>
          <div class="timer" id="timerRing">
            <span>剩余</span>
            <strong id="timer">180</strong>
            <small>秒</small>
          </div>
          <div class="score-panel streak">
            <span>连对</span>
            <strong id="streak">0</strong>
          </div>
        </section>

        <section class="status-chip" id="statusChip">准备</section>

        <section class="word-card" id="wordCard">
          <div class="card-shine"></div>
          <p id="word">山海关</p>
        </section>

        <section class="actions">
          <button class="primary" id="startButton" type="button" disabled>进行中</button>
          <button class="ghost action-button" id="correctButton" type="button" aria-label="点头，猜对加一分" aria-keyshortcuts="ArrowDown">
            <span class="button-title">点头 ↓</span>
            <span class="button-hint">猜对 +1</span>
          </button>
          <button class="ghost action-button" id="skipButton" type="button" aria-label="抬头，跳过本词" aria-keyshortcuts="ArrowUp">
            <span class="button-title">抬头 ↑</span>
            <span class="button-hint">跳过</span>
          </button>
        </section>
      </section>

      <section class="result hidden" id="resultPanel">
        <h2>本轮结束</h2>
        <p><strong id="finalScore">0</strong> 分</p>
        <video class="recording-playback hidden" id="recordingPlayback" controls playsinline></video>
        <a class="download-link hidden" id="downloadRecording" href="#" download="猜词派对.mp4">下载录像</a>
        <small class="saved-path" id="savedRecordingPath"></small>
        <button class="primary" id="againButton" type="button">回到准备页</button>
      </section>
    </main>

    <script src="./words.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
